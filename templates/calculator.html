<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Calculator</title>

    <style>
        body {
            background: #0f172a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #result {
            width: 100%;
            height: 60px;
            font-size: 24px;
            margin-bottom: 15px;
            border: none;
            outline: none;
            padding: 10px;
            border-radius: 10px;
            text-align: right;
            background: #020617;
            color: #fff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .number {
            background: #334155;
            color: white;
        }

        .operator {
            background: #f59e0b;
            color: white;
        }

        .equal {
            background: #22c55e;
            color: white;
            grid-column: span 2;
        }

        .clear {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="result" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearResult()">C</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        <button class="operator" onclick="appendValue('*')">*</button>
        <button class="operator" onclick="appendValue('-')">-</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
function appendValue(val) {
    document.getElementById("result").value += val;
}

function calculate() {
    try {
        let result = document.getElementById("result").value;
        document.getElementById("result").value = eval(result);
    } catch {
        document.getElementById("result").value = "Error";
    }
}

function clearResult() {
    document.getElementById("result").value = "";
}
</script>

</body>
</html>
